<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DeclutterBot — Sorting Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=IBM+Plex+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<header>
  <div class="logo">DeclutterBot <span>&#8212; sorting companion</span></div>
  <div class="actions">
    <input type="file" id="import-file-input" style="display:none" onchange="handleImportFile(event)"/>
    <div class="format-toggle" id="format-toggle">
      <button class="fmt-btn fmt-active" id="fmt-json" onclick="setFormat('json')">JSON</button>
      <button class="fmt-btn" id="fmt-csv" onclick="setFormat('csv')">CSV</button>
    </div>
    <button class="btn btn-outline" onclick="triggerImport()">&#8593; Import</button>
    <button class="btn btn-outline" onclick="triggerExport()">&#8595; Export</button>
    <button class="btn btn-primary" onclick="openNewTab('https://github.com/johana-star/DeclutterBot/issues')">🐛📑</button>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-left">
        <span id="inventory-label" class="inventory-label">Inventory</span>
        <span id="filter-badge" class="filter-badge" style="display:none"></span>
      </div>
      <span id="box-count">0 boxes</span>
    </div>
    <div class="sidebar-content" id="sidebar-content">
      <div class="empty-sidebar">No boxes yet.<br/>Start chatting to<br/>begin sorting.</div>
    </div>
  </aside>

  <div class="chat-area">
    <div class="chat-context-bar">
      <div class="context-dot" id="context-dot"></div>
      <span id="context-label">No active box &#8212; say hi to get started</span>
      <span id="progress-estimator"></span>
      <span id="storage-budget"></span>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="typing-indicator" id="typing">
      <span></span><span></span><span></span>
    </div>
    <div class="quick-replies" id="quick-replies"></div>
    <div class="chat-input-area">
      <textarea id="user-input" placeholder="Type here&#8230;" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendUserMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
<script src="app.js"></script>
<script src="ui.js"></script>
</body>
</html>
